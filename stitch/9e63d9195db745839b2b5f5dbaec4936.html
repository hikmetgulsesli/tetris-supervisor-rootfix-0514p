<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Over - Tetris Supervisor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed-variant": "#005321",
                        "surface": "#0e150e",
                        "inverse-on-surface": "#2a322a",
                        "secondary-fixed-dim": "#7bd0ff",
                        "on-primary-fixed": "#002109",
                        "secondary-container": "#00a6e0",
                        "on-surface-variant": "#bccbb9",
                        "surface-container-high": "#242c24",
                        "on-secondary": "#00354a",
                        "outline": "#869585",
                        "on-tertiary": "#60130d",
                        "primary": "#4be277",
                        "on-tertiary-fixed": "#410001",
                        "surface-container-low": "#161d16",
                        "on-tertiary-fixed-variant": "#7f2a21",
                        "on-primary-container": "#004b1e",
                        "on-secondary-container": "#00374d",
                        "primary-fixed": "#6bff8f",
                        "on-secondary-fixed-variant": "#004c69",
                        "on-secondary-fixed": "#001e2c",
                        "on-background": "#dce5d9",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "on-primary": "#003915",
                        "surface-dim": "#0e150e",
                        "on-surface": "#dce5d9",
                        "surface-tint": "#4ae176",
                        "tertiary-fixed": "#ffdad5",
                        "surface-container-highest": "#2f372e",
                        "surface-bright": "#333b33",
                        "secondary-fixed": "#c4e7ff",
                        "inverse-primary": "#006e2f",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#76231b",
                        "surface-container": "#1a221a",
                        "outline-variant": "#3d4a3d",
                        "primary-fixed-dim": "#4ae176",
                        "surface-container-lowest": "#091009",
                        "error": "#ffb4ab",
                        "background": "#0e150e",
                        "primary-container": "#22c55e",
                        "inverse-surface": "#dce5d9",
                        "tertiary-container": "#ff8b7c",
                        "secondary": "#7bd0ff",
                        "surface-variant": "#2f372e",
                        "tertiary": "#ffb5ab",
                        "tertiary-fixed-dim": "#ffb4a9"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "lg": "1.5rem",
                        "board-gutter": "2px",
                        "xs": "0.25rem",
                        "sm": "0.5rem",
                        "xl": "2rem",
                        "base": "4px",
                        "touch-target-min": "44px",
                        "md": "1rem"
                    },
                    fontFamily: {
                        "mono-data": ["JetBrains Mono"],
                        "body-base": ["Geist"],
                        "headline-md": ["Geist"],
                        "display-score": ["Geist"],
                        "status-label": ["Geist"],
                        "button-text": ["Geist"]
                    },
                    fontSize: {
                        "mono-data": ["18px", { lineHeight: "24px", fontWeight: "500" }],
                        "body-base": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "display-score": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "status-label": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }],
                        "button-text": ["14px", { lineHeight: "20px", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex antialiased">
<!-- Background UI Mockup (Behind Overlay) -->
<!-- TopAppBar (Mobile) -->
<header class="flex justify-between items-center w-full px-lg py-sm h-16 z-50 bg-surface border-b border-outline-variant md:hidden fixed top-0">
<div class="font-headline-md text-headline-md font-semibold text-primary">Tetris Supervisor Root Fix 0514p</div>
<div class="flex items-center gap-sm">
<button class="w-[44px] h-[44px] flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors rounded">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="w-[44px] h-[44px] flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors rounded">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</header>
<!-- SideNavBar (Desktop) -->
<nav class="hidden md:flex flex-col py-md z-40 bg-surface-container-low border-r border-outline-variant fixed left-0 top-0 bottom-0 w-64">
<div class="px-md mb-xl">
<div class="font-headline-md text-headline-md text-primary mb-sm">System Status</div>
<div class="font-status-label text-status-label text-on-surface-variant">Supervisor Active</div>
</div>
<div class="flex-1 flex flex-col gap-xs">
<a class="flex items-center h-[44px] text-primary font-bold border-l-4 border-primary pl-3 hover:bg-surface-container-high transition-colors active:translate-x-1 transition-all" href="#">
<span class="material-symbols-outlined mr-sm" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-body-base text-body-base">Play</span>
</a>
<a class="flex items-center h-[44px] text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 transition-all" href="#">
<span class="material-symbols-outlined mr-sm">analytics</span>
<span class="font-body-base text-body-base">Stats</span>
</a>
<a class="flex items-center h-[44px] text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 transition-all" href="#">
<span class="material-symbols-outlined mr-sm">leaderboard</span>
<span class="font-body-base text-body-base">Leaderboard</span>
</a>
<a class="flex items-center h-[44px] text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 transition-all" href="#">
<span class="material-symbols-outlined mr-sm">tune</span>
<span class="font-body-base text-body-base">Settings</span>
</a>
</div>
<div class="px-md mt-auto">
<button class="w-full h-[44px] bg-primary text-on-primary font-button-text text-button-text rounded flex items-center justify-center hover:bg-primary-fixed-dim transition-colors">
                Restart Session
            </button>
</div>
</nav>
<!-- Main Game Canvas Mock -->
<main class="flex-1 flex items-center justify-center md:ml-64 mt-16 md:mt-0 p-lg opacity-30 blur-sm pointer-events-none">
<div class="w-full max-w-[300px] aspect-[1/2] bg-[#111827] border border-[#334155] rounded-DEFAULT p-board-gutter flex flex-col">
<!-- Simulated grid lines -->
<div class="flex-1 border-b border-surface-variant opacity-50"></div>
<div class="flex-1 border-b border-surface-variant opacity-50"></div>
<div class="flex-1 border-b border-surface-variant opacity-50"></div>
<!-- ... more lines omitted for brevity ... -->
<div class="flex-1"></div>
</div>
</main>
<!-- Game Over Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/80 backdrop-blur-md p-md md:pl-64">
<div class="w-full max-w-md bg-surface border border-outline-variant rounded-xl p-xl shadow-2xl flex flex-col items-center animate-fade-in-up">
<!-- Header -->
<h1 class="font-display-score text-display-score text-error mb-xl tracking-wider text-center drop-shadow-md">
                GAME OVER
            </h1>
<!-- Stats Container (Bento/Card Style) -->
<div class="w-full flex flex-col gap-sm mb-xl">
<!-- Stat Row: Final Score -->
<div class="flex items-center justify-between p-md bg-surface-container-low border border-outline-variant rounded-lg">
<span class="font-status-label text-status-label text-on-surface-variant uppercase tracking-widest">FINAL SCORE</span>
<span class="font-mono-data text-mono-data text-primary">45,800</span>
</div>
<!-- Secondary Stats Grid -->
<div class="grid grid-cols-2 gap-sm w-full">
<div class="flex flex-col items-center justify-center p-md bg-surface-container-low border border-outline-variant rounded-lg">
<span class="font-status-label text-status-label text-on-surface-variant uppercase tracking-widest mb-xs text-center">LEVEL REACHED</span>
<span class="font-mono-data text-mono-data text-on-surface">12</span>
</div>
<div class="flex flex-col items-center justify-center p-md bg-surface-container-low border border-outline-variant rounded-lg">
<span class="font-status-label text-status-label text-on-surface-variant uppercase tracking-widest mb-xs text-center">LINES CLEARED</span>
<span class="font-mono-data text-mono-data text-on-surface">134</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-md w-full">
<button class="flex-1 h-[44px] flex items-center justify-center bg-primary text-on-primary font-button-text text-button-text rounded-DEFAULT hover:bg-primary-fixed-dim transition-colors outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background">
                    PLAY AGAIN
                </button>
<button class="flex-1 h-[44px] flex items-center justify-center bg-surface border border-outline text-on-surface font-button-text text-button-text rounded-DEFAULT hover:bg-surface-container-high transition-colors outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background">
                    MAIN MENU
                </button>
</div>
</div>
</div>
</body></html>
