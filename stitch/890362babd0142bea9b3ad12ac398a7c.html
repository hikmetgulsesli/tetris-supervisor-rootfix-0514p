<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#005321",
                      "surface": "#0e150e",
                      "inverse-on-surface": "#2a322a",
                      "secondary-fixed-dim": "#7bd0ff",
                      "on-primary-fixed": "#002109",
                      "secondary-container": "#00a6e0",
                      "on-surface-variant": "#bccbb9",
                      "surface-container-high": "#242c24",
                      "on-secondary": "#00354a",
                      "outline": "#869585",
                      "on-tertiary": "#60130d",
                      "primary": "#4be277",
                      "on-tertiary-fixed": "#410001",
                      "surface-container-low": "#161d16",
                      "on-tertiary-fixed-variant": "#7f2a21",
                      "on-primary-container": "#004b1e",
                      "on-secondary-container": "#00374d",
                      "primary-fixed": "#6bff8f",
                      "on-secondary-fixed-variant": "#004c69",
                      "on-secondary-fixed": "#001e2c",
                      "on-background": "#dce5d9",
                      "on-error-container": "#ffdad6",
                      "on-error": "#690005",
                      "on-primary": "#003915",
                      "surface-dim": "#0e150e",
                      "on-surface": "#dce5d9",
                      "surface-tint": "#4ae176",
                      "tertiary-fixed": "#ffdad5",
                      "surface-container-highest": "#2f372e",
                      "surface-bright": "#333b33",
                      "secondary-fixed": "#c4e7ff",
                      "inverse-primary": "#006e2f",
                      "error-container": "#93000a",
                      "on-tertiary-container": "#76231b",
                      "surface-container": "#1a221a",
                      "outline-variant": "#3d4a3d",
                      "primary-fixed-dim": "#4ae176",
                      "surface-container-lowest": "#091009",
                      "error": "#ffb4ab",
                      "background": "#0e150e",
                      "primary-container": "#22c55e",
                      "inverse-surface": "#dce5d9",
                      "tertiary-container": "#ff8b7c",
                      "secondary": "#7bd0ff",
                      "surface-variant": "#2f372e",
                      "tertiary": "#ffb5ab",
                      "tertiary-fixed-dim": "#ffb4a9"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "lg": "1.5rem",
                      "board-gutter": "2px",
                      "xs": "0.25rem",
                      "sm": "0.5rem",
                      "xl": "2rem",
                      "base": "4px",
                      "touch-target-min": "44px",
                      "md": "1rem"
              },
              "fontFamily": {
                      "mono-data": [
                              "JetBrains Mono"
                      ],
                      "body-base": [
                              "Geist"
                      ],
                      "headline-md": [
                              "Geist"
                      ],
                      "display-score": [
                              "Geist"
                      ],
                      "status-label": [
                              "Geist"
                      ],
                      "button-text": [
                              "Geist"
                      ]
              },
              "fontSize": {
                      "mono-data": [
                              "18px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-base": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "600"
                              }
                      ],
                      "display-score": [
                              "48px",
                              {
                                      "lineHeight": "1.1",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "status-label": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ],
                      "button-text": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "600"
                              }
                      ]
              }
            },
          }
        }
      </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
      </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface text-primary border-b border-outline-variant flex justify-between items-center w-full px-lg py-sm h-16 z-50 fixed top-0 w-full">
<div class="flex items-center gap-sm">
<span class="font-headline-md text-headline-md font-semibold text-primary">Tetris Supervisor Root Fix 0514p</span>
</div>
<div class="flex items-center gap-md">
<button aria-label="Settings" class="w-[44px] h-[44px] flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors rounded active:scale-95 transition-transform focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button aria-label="Help" class="w-[44px] h-[44px] flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors rounded active:scale-95 transition-transform focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<div class="flex flex-1 mt-16 overflow-hidden">
<!-- SideNavBar -->
<nav class="bg-surface-container-low border-r border-outline-variant fixed left-0 top-16 bottom-0 flex flex-col py-md z-40 h-full w-64 hidden md:flex">
<div class="px-md pb-lg mb-md border-b border-outline-variant">
<div class="flex items-center gap-sm mb-xs">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-status-label text-status-label text-on-surface">System Status</span>
</div>
<span class="font-body-base text-body-base text-on-surface-variant text-sm">Supervisor Active</span>
</div>
<div class="flex-1 flex flex-col gap-sm px-sm">
<!-- Active Nav Item -->
<a class="flex items-center gap-md h-[44px] rounded text-primary font-bold border-l-4 border-primary pl-3 hover:bg-surface-container-high transition-colors active:translate-x-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-low" href="#">
<span class="material-symbols-outlined" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-button-text text-button-text">Play</span>
</a>
<!-- Inactive Nav Items -->
<a class="flex items-center gap-md h-[44px] rounded text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-low" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-button-text text-button-text">Stats</span>
</a>
<a class="flex items-center gap-md h-[44px] rounded text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-low" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-button-text text-button-text">Leaderboard</span>
</a>
<a class="flex items-center gap-md h-[44px] rounded text-on-surface-variant pl-4 hover:bg-surface-container-high transition-colors active:translate-x-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-low" href="#">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="font-button-text text-button-text">Settings</span>
</a>
</div>
<div class="px-md mt-auto pt-md border-t border-outline-variant">
<button class="w-full h-[44px] flex items-center justify-center gap-sm text-on-surface bg-surface border border-outline rounded hover:bg-surface-container-high transition-colors font-button-text text-button-text focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-low">
<span class="material-symbols-outlined" data-icon="restart_alt">restart_alt</span>
                    Restart Session
                </button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center md:ml-64 p-lg relative overflow-hidden">
<!-- Subtle Background Grid Effect -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(circle at 1px 1px, #dce5d9 1px, transparent 0); background-size: 40px 40px;"></div>
<div class="max-w-2xl w-full flex flex-col items-center space-y-xl z-10">
<!-- Hero Branding -->
<div class="text-center space-y-sm mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high border border-outline-variant mb-md shadow-[0_0_30px_rgba(34,197,94,0.1)]">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="terminal">terminal</span>
</div>
<h1 class="font-display-score text-display-score text-on-surface tracking-tight">
                        Tetris Supervisor
                    </h1>
<p class="font-mono-data text-mono-data text-primary opacity-80 uppercase tracking-widest">
                        Root Fix 0514p
                    </p>
</div>
<!-- Action Menu -->
<div class="w-full max-w-sm flex flex-col gap-md">
<button class="w-full min-h-[56px] flex items-center justify-center bg-primary-container text-on-primary-container font-button-text text-button-text rounded-lg hover:bg-primary-fixed transition-colors shadow-[0_0_15px_rgba(34,197,94,0.2)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background active:scale-[0.98]">
                        START NEW GAME
                    </button>
<button class="w-full min-h-[56px] flex items-center justify-center bg-surface border border-primary text-primary font-button-text text-button-text rounded-lg hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background active:scale-[0.98]">
                        RESUME
                    </button>
<button class="w-full min-h-[56px] flex items-center justify-center bg-surface border border-outline text-on-surface font-button-text text-button-text rounded-lg hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-4 focus:ring-offset-background active:scale-[0.98]">
                        CONTROLS HELP
                    </button>
</div>
<div class="mt-xl pt-lg border-t border-outline-variant w-full max-w-sm text-center">
<p class="font-status-label text-status-label text-on-surface-variant uppercase">System Ready // Awaiting Input</p>
</div>
</div>
</main>
</div>
</body></html>
